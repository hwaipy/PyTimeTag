<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PyTimeTag GUI</title>
    <style>
      /* Critical CSS for initial loading screen - inlined for instant display */
      * { margin: 0; padding: 0; box-sizing: border-box; }

      #app-loader {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }

      #app-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loader-brand {
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        font-size: 32px;
        font-weight: 600;
        letter-spacing: -0.5px;
        margin-bottom: 32px;
      }

      .loader-progress {
        width: 200px;
        height: 3px;
        background: rgba(255,255,255,0.15);
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }

      .loader-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #0071e3, #2997ff);
        box-shadow: 0 0 10px rgba(0,113,227,0.5);
        animation: load-progress 2s ease-out forwards;
      }

      @keyframes load-progress {
        0% { width: 0%; }
        40% { width: 30%; }
        60% { width: 50%; }
        80% { width: 80%; }
        100% { width: 95%; }
      }

      .loader-hint {
        color: rgba(255,255,255,0.5);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        font-size: 13px;
        margin-top: 16px;
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- Initial loading screen - shown immediately, hidden when Vue app mounts -->
    <div id="app-loader">
      <div class="loader-brand">PyTimeTag</div>
      <div class="loader-progress">
        <div class="loader-bar"></div>
      </div>
      <div class="loader-hint">Loading...</div>
    </div>

    <!-- quasar:entry-point -->
  </body>
</html>
